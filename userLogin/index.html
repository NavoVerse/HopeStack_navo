<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MindfulSpace - Welcome Back</title>
    <meta name="description" content="Securely log in or register for MindfulSpace, your personal sanctuary for mental well-being and meditation.">
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="background-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>

    <main class="container">
        <div class="form-wrapper">
            <!-- Header Section -->
            <header class="header">
                <div class="logo">
                    <svg width="40" height="40" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <circle cx="20" cy="20" r="18" stroke="currentColor" stroke-width="2.5"/>
                        <path d="M12 24C12 24 15 20 20 20C25 20 28 24 28 24" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/>
                        <path d="M16 16H16.01" stroke="currentColor" stroke-width="3" stroke-linecap="round"/>
                        <path d="M24 16H24.01" stroke="currentColor" stroke-width="3" stroke-linecap="round"/>
                    </svg>
                    <h1>MindfulSpace</h1>
                </div>
                <p class="subtitle" id="form-subtitle">Your journey to peace starts here.</p>
            </header>

            <!-- Login Form -->
            <form id="login-form" class="auth-form active">
                <div class="input-group">
                    <label for="login-email">Email Address</label>
                    <input type="email" id="login-email" placeholder="name@example.com" required>
                </div>
                <div class="input-group">
                    <div class="label-row">
                        <label for="login-password">Password</label>
                        <a href="#" class="forgot-link">Forgot?</a>
                    </div>
                    <input type="password" id="login-password" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn btn-primary" id="login-submit">Sign In</button>
                <p class="switch-form">Don't have an account? <a href="#" id="to-register">Create one</a></p>
            </form>

            <!-- Register Form -->
            <form id="register-form" class="auth-form">
                <div class="input-group">
                    <label for="reg-name">Full Name</label>
                    <input type="text" id="reg-name" placeholder="John Doe" required>
                </div>
                <div class="input-group">
                    <label for="reg-email">Email Address</label>
                    <input type="email" id="reg-email" placeholder="name@example.com" required>
                </div>
                <div class="input-group">
                    <label for="reg-password">Password</label>
                    <input type="password" id="reg-password" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn btn-primary" id="register-submit">Create Account</button>
                <p class="switch-form">Already have an account? <a href="#" id="to-login">Sign In</a></p>
            </form>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
